{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h1>Add Review</h1>
    <h2 class="movie-title">{{ movie.title }}</h2>
    <form method="POST" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="errorlist">{{ form.non_field_errors }}</div>
        {% endif %}
        <div class="form-group">
            <label for="{{ form.text.id_for_label }}">Review</label>
            {{ form.text }}
            {{ form.text.errors }}
        </div>
        <div class="form-group">
            <label for="{{ form.rating.id_for_label }}">Rating</label>
            {{ form.rating }}
            {{ form.rating.errors }}
        </div>
        <button class="form-button" type="submit">Add Review</button>
    </form>
</div>
{% endblock %}
